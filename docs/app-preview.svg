  <text x="77" y="85" fill="#8EADFF" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">API</text>
  <text x="118" y="76" fill="#F4F7FB" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">API Workflow Studio</text>
  <text x="118" y="96" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="12">Saved locally</text>
  <rect x="642" y="63" width="118" height="34" rx="17" fill="#101319" stroke="white" stroke-opacity="0.1"/>
  <circle cx="662" cy="80" r="4" fill="#6EE7B7"/>
  <text x="676" y="84" fill="#CAD2DE" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Success</text>
  <rect x="1214" y="62" width="66" height="36" rx="11" fill="#171B22" stroke="white" stroke-opacity="0.1"/>
  <text x="1235" y="84" fill="#D8DEE7" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="650">Save</text>
  <rect x="1290" y="62" width="86" height="36" rx="11" fill="url(#accent)"/>
  <text x="1312" y="84" fill="#061127" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="750">Run</text>

  <rect x="48" y="128" width="300" height="724" rx="22" fill="#13161C" stroke="white" stroke-opacity="0.09"/>
  <text x="70" y="164" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="750" letter-spacing="2">LIBRARY</text>
  <text x="70" y="190" fill="#F4F7FB" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Components</text>
  <text x="70" y="238" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="750" letter-spacing="2">CORE NODES</text>
