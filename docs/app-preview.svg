<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Visual API Workflow Builder interface preview</title>
  <desc id="desc">A dark SaaS workflow builder interface with a node library, visual canvas, connected nodes, and settings inspector.</desc>
  <defs>
    <linearGradient id="bg" x1="720" y1="0" x2="720" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12151B"/>
      <stop offset="1" stop-color="#07080B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86A8FF"/>
      <stop offset="1" stop-color="#5B8CFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#9AA8BE" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="24" y="24" width="1392" height="852" rx="28" fill="#0D0F12" stroke="white" stroke-opacity="0.08"/>

  <rect x="48" y="48" width="1344" height="64" rx="20" fill="#15181F" stroke="white" stroke-opacity="0.1"/>
