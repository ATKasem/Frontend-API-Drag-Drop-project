    <text x="502" y="324" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.3">REQUEST</text>
    <line x1="440" y1="340" x2="688" y2="340" stroke="white" stroke-opacity="0.08"/>
    <text x="454" y="368" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">GET</text>
    <text x="454" y="391" fill="#D6DBE2" font-family="SFMono-Regular, Consolas, monospace" font-size="11">https://api.example.com/orders</text>
