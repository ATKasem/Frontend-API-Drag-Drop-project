  <text x="1112" y="486" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="750" letter-spacing="2">RUNTIME</text>
  <text x="1112" y="512" fill="#F4F7FB" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">success</text>
  <rect x="1112" y="536" width="248" height="104" rx="12" fill="#0B0D11" stroke="white" stroke-opacity="0.08"/>
  <text x="1128" y="566" fill="#AEB6C2" font-family="SFMono-Regular, Consolas, monospace" font-size="11">{</text>
  <text x="1144" y="588" fill="#AEB6C2" font-family="SFMono-Regular, Consolas, monospace" font-size="11">"status": 200,</text>
  <text x="1144" y="610" fill="#AEB6C2" font-family="SFMono-Regular, Consolas, monospace" font-size="11">"ok": true</text>
  <text x="1128" y="632" fill="#AEB6C2" font-family="SFMono-Regular, Consolas, monospace" font-size="11">}</text>
</svg>
