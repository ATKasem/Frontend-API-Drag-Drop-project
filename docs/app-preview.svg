    <text x="736" y="324" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.3">MAPPER</text>
    <line x1="674" y1="340" x2="922" y2="340" stroke="white" stroke-opacity="0.08"/>
    <text x="688" y="382" fill="#D6DBE2" font-family="SFMono-Regular, Consolas, monospace" font-size="11">return data.status</text>
    <circle cx="922" cy="344" r="6" fill="#7AA2FF"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="924" y="276" width="248" height="146" rx="16" fill="#171B22" stroke="#7AA2FF" stroke-opacity="0.48"/>
    <circle cx="924" cy="344" r="6" fill="#67E8F9"/>
    <rect x="938" y="290" width="36" height="36" rx="12" fill="#202734"/>
