    <text x="986" y="306" fill="#F4F7FB" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Output</text>
    <text x="986" y="324" fill="#8B929E" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1.3">RESULT</text>
    <line x1="924" y1="340" x2="1172" y2="340" stroke="white" stroke-opacity="0.08"/>
    <text x="938" y="374" fill="#D6DBE2" font-family="SFMono-Regular, Consolas, monospace" font-size="11">{ "status": 200 }</text>
